name: Fix nginx SPA routing

on:
  workflow_dispatch:

jobs:
  fix-nginx:
    runs-on: ubuntu-latest
    steps:
      - name: Asegurar try_files en jeeljel-landing
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 187.77.196.169 >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@187.77.196.169 << 'ENDSSH'
          set -e
          CONF="/etc/nginx/sites-enabled/jeeljel-landing"

          if grep -q 'try_files \$uri \$uri/ /index.html' "$CONF"; then
            echo "try_files ya existe en $CONF"
          else
            cp "$CONF" "${CONF}.bak.$(date +%Y%m%d%H%M%S)"
            sed -i '/location \/ {/a\        try_files $uri $uri/ /index.html;' "$CONF"
            echo "try_files agregado en location /"
          fi

          nginx -t
          systemctl reload nginx
          echo "Nginx recargado correctamente"
          ENDSSH
