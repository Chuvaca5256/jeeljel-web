name: Deploy jeeljel.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configurar SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::El secret VPS_SSH_KEY no está configurado en el repositorio."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY no es una llave privada SSH válida."
            exit 1
          fi
          echo "Llave SSH configurada correctamente."

      - name: Verificar conexión VPS
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          ssh ${SSH_OPTS} root@187.77.196.169 \
            "mkdir -p /var/www/jeeljel-web/dist && df -h /var/www && echo OK"

      - name: Deploy al VPS
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=60 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          echo "Tamaño del build:"
          du -sh ./dist/
          ls ./dist/assets/ | wc -l
          echo "archivos en dist/assets"
          for attempt in 1 2 3 4 5; do
            echo "Deploy intento ${attempt}/5..."
            if rsync -avz --delete --timeout=300 -e "ssh ${SSH_OPTS}" ./dist/ root@187.77.196.169:/var/www/jeeljel-web/dist/; then
              echo "Deploy exitoso."
              ssh ${SSH_OPTS} root@187.77.196.169 "ls -la /var/www/jeeljel-web/dist/assets/ | tail -5"
              exit 0
            fi
            echo "Rsync falló en intento ${attempt}."
            sleep 20
          done
          echo "::error::Deploy falló después de 5 intentos."
          exit 1

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=60 \
            root@187.77.196.169 \
            "systemctl reload nginx"
